<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>NSA Profile - Official Relations Portal</title>
    <link
      rel="icon"
      href="./assets/img/favicon.ico"
      type="image/vnd.microsoft.icon" />
    <link
      rel="stylesheet"
      href="./assets/css/styles.css" />
  </head>
  <body>
    <!-- SIDEBAR FIXA -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-box">
          <img
            id="logobrand"
            src="./assets/img/logo-en.png"
            alt="OPAS"
            class="brand-logo" />
        </div>
        <div
          class="brand-title"
          id="brand-title">
          NSA Portal
        </div>
      </div>

      <div class="controls">
        <!--         <label
                  class="label"
                  id="nsa-select-input"
                  for="nsa-select"
                  >Select NSA</label
                >
                <select
                  id="nsa-select"
                  class="input"></select> -->
        <label
          class="label"
          for="search-open"
          id="searchNSA"
          >Search NSA
        </label>
        <input
          id="searchInput"
          class="input"
          placeholder="Type a name..." />
        <ul
          id="search-results"
          class="search-results"
          aria-live="polite"></ul>

        <label
          class="label"
          for="period-select"
          id="uiPeriodLabel"
          >Collaboration Period</label
        >
        <select
          id="period-select"
          class="input">
          <option value="">All Periods</option>
        </select>

        <label
          class="label"
          for="period-select"
          id="organization-type"
          >Organization type</label
        >
        <select
          id="organization-type-input"
          class="input">
          <option value="">All</option>
          <option value="Non-governmental Organizations">Non-governmental Organizations</option>
          <option value="Philanthropic Foundation">Philanthropic Foundation</option>
        </select>

        <button
          id="clear-filters"
          class="btn btn-ghost">
          Clear
        </button>

        <p>On this page</p>
        <h2></h2>
        <ul>
          <li>
            <a href="#profileTitle">Profile</a>
          </li>
          <li>
            <a href="#uiFinTitle">Financial</a>
          </li>
          <li>
            <a href="#wpTitle">Workplans</a>
          </li>
        </ul>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- language -->
      <div class="language-link">
        <a        
          data-lan="en"
          class="lang-toggle">
          English
        </a> |
        <a         
          data-lan="es"
          class="lang-toggle">
          Español
        </a>
      </div>

      <!-- language -->
      <header class="header">
        <h1 id="nsa-title"></h1>
        <p id="nsa-subtitle"></p>
      </header>

      <!-- NSA profile starts -->
      <section class="card">
        <h2 id="profileTitle">NSA Profile</h2>
        <p
          class="muted"
          id="profileSubtitle"></p>
        <div id="nsa-metrics"></div>
        <div id="nsa-info"></div>
      </section>

      <!-- financial -->
      <div
        class="card"
        id="financial_card">
        <h2 id="uiFinTitle">Financial Overview</h2>
        <h5 id="FinAnnualIncomeYear"></h5>
        <p
          class="muted"
          id="uiFinSubtitle"></p>
        <div class="chart-wrapper">
          <canvas id="financialBarChart"></canvas>
        </div>
      </div>
      <!-- NSA profile ends -->

      <!-- disclaimer -->
      <section
        class="disclaimer"
        id="landingDisclaimer">
        <strong id="uiDisclaimerTitle">Note:</strong>
        <span id="uiDisclaimerText"></span>
      </section>

      <!-- Collaboration with PAHO Activities -->
      <section class="card">
        <h2 id="collabTitle">Collaboration with PAHO</h2>
        <div id="collabSubtitle"></div>
        <div id="nsa-activities"></div>
      </section>

      <!-- work plans -->
      <section class="card">
        <h2 id="wpTitle">Work Plans</h2>
        <p
          class="muted"
          id="wpSubtitle"></p>
        <div id="workplans"></div>
      </section>

      <!-- FOOTER -->
      <footer class="app-footer">
        <p>© 2026 Pan American Health Organization (PAHO) • Non-State Actors Portal</p>
      </footer>
    </main>

    <!-- MODAL SEARCH -->

      id="search-modal"
      class="search-modal hidden"
      aria-hidden="true">
      <div
        class="search-modal-backdrop"
        data-close-search></div>
      <div
        class="search-modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="searchNSA">
        <div class="search-modal-header">
          <input
            id="search-modal-input"
            class="search-modal-input"
            type="text"
            placeholder="Type at least 3 characters to search"
            autocomplete="off" />
          <button
            id="search-close"
            class="search-close"
            type="button"
            aria-label="Close search">
            Esc
          </button>
        </div>
        <div
          id="search-modal-results"
          class="search-results"></div>
      </div>
    </div> -->

    <script
      src="./assets/js/app.js"
      type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
