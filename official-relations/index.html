<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>PAHO • Non-State Actors (NSA)</title>
    <link
      rel="icon"
      href="./assets/img/favicon.ico"
      type="image/vnd.microsoft.icon" />
    <link
      rel="stylesheet"
      href="./assets/css/styles.css" />
  </head>
  <body>
    <!-- SIDEBAR FIXA -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-box">
          <img
            id="logobrand"
            src="./assets/img/logo-en.png"
            alt="OPAS"
            class="brand-logo" />
          <div
            class="brand-title"
            id="brand-title">
            NSA Portal
          </div>
        </div>
      </div>

      <div class="controls">
        <label
          class="label"
          for="search-open"
          id="searchNSA"
          >Search NSA
        </label>
        <input
          id="searchInput"
          class="input"
          placeholder="Type a name..." />
        <ul
          id="search-results"
          class="search-results"
          aria-live="polite"></ul>

        <label
          class="label"
          for="period-select"
          id="uiPeriodLabel"
          >Collaboration Period</label
        >
        <select
          id="period-select"
          class="input">
          <option value="all">All</option>
        </select>
        <!-- Organization type -->
        <label
          class="label"
          for="period-select"
          id="organization-type"
          >Organization type</label
        >
        <select
          id="organization-type-input"
          class="input">
          <option
            value="all"
            id="organization-all">
            All
          </option>
          <option value="Non-governmental Organizations">Non-governmental Organizations</option>
          <option value="Philanthropic Foundation">Philanthropic Foundation</option>
        </select>

        <!-- TypeOfSubmission -->
        <label
          class="label"
          for="period-select"
          id="TypeOfSubmission-type"
          >TypeOfSubmission</label
        >
        <select
          id="typeOfSubmission-type-input"
          class="input">
          <option
            value="all"
            id="TypeOfSubmission-all">
            All
          </option>
          <option value="Non-governmental Organizations">Non-governmental Organizations</option>
          <option value="Philanthropic Foundation">Philanthropic Foundation</option>
        </select>

        <button
          id="clear-filters"
          class="btn btn-ghost">
          Clear
        </button>

        <p id="navTitle">On this page</p>
        <ul class="on-this-page">
          <li>
            <a
              href="#profileTitle"
              id="profileTitlenav"
              rel="noopener noreferrer"
              >Profile</a
            >
          </li>
          <li class="financialnav">
            <a
              href="#uiFinTitle"
              id="financialnav"
              rel="noopener noreferrer"
              >Financial information</a
            >
          </li>
          <li>
            <a
              href="#collaboraionWihPAHO"
              id="CollaborationNav"
              rel="noopener noreferrer"
              >Collaboration with PAHO</a
            >
          </li>
        </ul>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- language -->
      <div class="language-link">
        <a
          data-lan="en"
          class="lang-toggle">
          English
        </a>
        |
        <a
          data-lan="es"
          class="lang-toggle">
          Español
        </a>
      </div>

      <!-- language -->
      <header class="header">
        <h1 id="nsa-title"></h1>
        <p id="nsa-subtitle"></p>
      </header>

      <!-- NSA profile starts -->
      <section class="card">
        <h2 id="profileTitle">NSA Profile</h2>
        <p
          class="muted"
          id="profileSubtitle"></p>
        <div id="nsa-metrics"></div>
        <div id="nsa-info"></div>
      </section>

      <!-- financial -->
      <div
        class="card"
        id="financial_card">
        <h2 id="uiFinTitle">Financial Overview</h2>
        <h5 id="FinAnnualIncomeYear"></h5>
        <p
          class="muted"
          id="uiFinSubtitle"></p>
        <div class="chart-wrapper">
          <canvas id="financialBarChart"></canvas>
        </div>
      </div>
      <!-- NSA profile ends -->

      <!-- disclaimer -->
      <section
        class="disclaimer"
        id="landingDisclaimer">
        <strong id="uiDisclaimerTitle">Note:</strong>
        <span id="uiDisclaimerText"></span>
      </section>

      <!-- Collaboration with PAHO Activities -->
      <section
        class="card"
        id="collaboraionWihPAHO">
        <h2 id="collabTitle">Collaboration with PAHO</h2>
        <!--  rendercollabWPActHealthAgendaObj  -->
        <div id="collabWPActHealthAgendaObj" class="list item"></div>

        <!--  StrategicPlan  -->
        <div id="strategicPlan" class="list item"></div>

        <div>
          <h4 id="collabSubtitle" class="subtitle"></h4>
        </div>
        <div id="nsa-activities"></div>
      </section>

      <!-- work plans -->
      <section
        class="card"
        id="workplans-card">
        <h4 id="wpTitle" class="subtitle">Work Plans</h4>
        <p
          class="muted"
          id="wpSubtitle"></p>
        <div id="workplans"></div>
      </section>

      <!-- FOOTER -->
      <footer class="app-footer">
        <p>© 2026 Pan American Health Organization (PAHO) • Non-State Actors Portal</p>
      </footer>
    </main>
    <script
      src="./assets/js/app.js"
      type="module"></script>
    <script src="./assets/js/vendors/chart.js"></script>
  </body>
</html>
