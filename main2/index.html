<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>NSA Profile</title>
    <link
      rel="stylesheet"
      href="./assets/css/styles.css" />
  </head>
  <body>
    <!-- SIDEBAR FIXA -->
    <aside class="sidebar">
      <div class="brand">
        <!-- deixa pronto pro teu logo grande -->
        <div class="logo-box">
          <!-- Troca por <img src="..." class="logo" /> quando quiser -->
          <img
          src="./assets/img/logo-pt-br.png"
          alt="OPAS"
          class="brand-logo" />
        </div>
        <div class="brand-title">NSA Portal</div>
      </div>

      <div class="controls">
        <label class="label">Language</label>
        <button
          id="lang-toggle"
          class="btn">
          ES
        </button>

        <label
          class="label"
          for="period-select"
          >Collaboration Period</label
        >
        <select
          id="period-select"
          class="input">
          <option value="">All Periods</option>
        </select>

        <label
          class="label"
          for="nsa-select"
          >Select NSA</label
        >
        <select
          id="nsa-select"
          class="input"></select>

        <label
          class="label"
          for="search-title"
          >Search by Title</label
        >
        <input
          id="search-title"
          class="input"
          type="text"
          placeholder="" />

        <div class="filters">
          <label class="check">
            <input
              id="filter-activities"
              type="checkbox"
              checked />
            <span>Activities</span>
          </label>

          <label class="check">
            <input
              id="filter-workplans"
              type="checkbox"
              checked />
            <span>Workplans</span>
          </label>
        </div>

        <button
          id="clear-filters"
          class="btn btn-ghost">
          Clear
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="header">
        <h1 id="nsa-title"></h1>
        <p id="nsa-subtitle"></p>
      </header>
      <!-- tudo sobre o nsa -->
      <section class="card">
        <h2>General Information</h2>
        <div id="nsa-metrics"></div>
        <div id="nsa-info"></div>

      </section>

      <section class="card">
        <h2>Activities</h2>
        <div id="activities"></div>
      </section>

      <section class="card">
        <h2>Work Plans</h2>
        <div id="workplans"></div>
      </section>

      <section class="disclaimer">
        <p id="disclaimer-text"></p>
      </section>
    </main>

    <script
      src="./assets/js/app.js"
      type="module"></script>
  </body>
</html>
